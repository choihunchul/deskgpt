# Required secret:
# - HOMEBREW_TAP_TOKEN: PAT with write access to choihunchul/homebrew-tap
name: Publish Homebrew Cask

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to publish (for example, v1.0.0)"
        required: true

permissions:
  contents: read

jobs:
  resolve-tag:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.get_tag.outputs.tag }}
    steps:
      - name: Get tag
        id: get_tag
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${{ github.event.release.tag_name }}"
          fi

          if [[ -z "$TAG" || "$TAG" == "null" ]]; then
            echo "Unable to resolve release tag." >&2
            exit 1
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

  publish:
    needs: resolve-tag
    uses: choihunchul/github--actions/.github/workflows/publish-homebrew-cask.yml@main
    with:
      tap-repo: "choihunchul/homebrew-tap"
      cask-name: "deskgpt"
      name: "DeskGPT"
      desc: "Tiny native macOS wrapper for ChatGPT"
      homepage: "https://github.com/hunchulchoi/deskgpt"
      app-name: "DeskGPT.app"
      asset-name: "DeskGPT-{version}.dmg"
      tag: ${{ needs.resolve-tag.outputs.tag }}
      verify-tag: true
      zap-trash: "~/Library/Preferences/com.myside.DeskGPT.plist ~/Library/Application?Support/DeskGPT"
      release-repo: "hunchulchoi/deskgpt"
    secrets:
      HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
